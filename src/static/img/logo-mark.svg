<?xml version="1.0" encoding="UTF-8"?>
<!--
    Zdrowie.fit — znak (mark) "Harmonia"
    Półksiężyc (holizm/rytm) + subtelny impuls (medyczność)
    Używaj jako favicon, ikona w apce, sygnet.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Zdrowie.fit">
    <defs>
        <linearGradient id="zf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d5464"/>
            <stop offset="100%" stop-color="#2a7b9b"/>
        </linearGradient>
    </defs>
    <!-- Tło: zaokrąglony kwadrat, Cloud Dancer -->
    <rect width="64" height="64" rx="14" fill="#f4ede4"/>

    <!-- Półksiężyc (open-arc) -->
    <path d="M 44 14
             A 22 22 0 1 0 44 50
             A 16 16 0 1 1 44 14 Z"
          fill="url(#zf-grad)"/>

    <!-- Impuls / pulse — subtelna linia w otwarciu -->
    <path d="M 14 32 L 20 32 L 23 26 L 27 38 L 30 32 L 38 32"
          fill="none"
          stroke="#ff7b5c"
          stroke-width="2.4"
          stroke-linecap="round"
          stroke-linejoin="round"/>
</svg>
