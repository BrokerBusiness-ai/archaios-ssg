name: Build and deploy Archaios SSG

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domena do deployu (slug z domains/*.yaml, np. zdrowie-fit) lub "all"'
        required: true
        default: 'all'
      clean:
        description: 'Wyczyść output przed buildem'
        required: false
        type: boolean
        default: true

env:
  PYTHONIOENCODING: utf-8

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.pick.outputs.domains }}
    steps:
      - uses: actions/checkout@v4
      - id: pick
        shell: bash
        run: |
          # WYKLUCZENIA — domeny które są JUŻ LIVE i NIE wolno nadpisywać + odłożone:
          #   zdrowie-fit, aidzisiaj-pl, twojamediacja-pl, creativebrandpro-com, analizastatystyczna-me, wppage-pl = live, ręcznie zdeployowane
          #   psycho-edu-pl = odłożone na lipiec/sierpień (DNS)
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.domain }}" == "all" ]]; then
            DOMAINS=$(ls domains/*.yaml 2>/dev/null | xargs -n1 basename | sed 's/\.yaml$//' \
              | grep -v '^_schema$' \
              | grep -v '^zdrowie-fit$' \
              | grep -v '^aidzisiaj-pl$' \
              | grep -v '^twojamediacja-pl$' \
              | grep -v '^creativebrandpro-com$' \
              | grep -v '^analizastatystyczna-me$' \
              | grep -v '^wppage-pl$' \
              | grep -v '^psycho-edu-pl$' \
              | jq -R -s -c 'split("\n") | map(select(length>0))')
          else
            DOMAINS='["${{ github.event.inputs.domain }}"]'
          fi
          echo "domains=$DOMAINS" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $DOMAINS"

  build-and-deploy:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain: ${{ fromJSON(needs.matrix-setup.outputs.domains) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install Pillow python-dotenv httpx pyyaml python-frontmatter markdown

      - name: Read domain slug → real domain
        id: cfg
        shell: bash
        run: |
          DOMAIN_YAML="domains/${{ matrix.domain }}.yaml"
          REAL_DOMAIN=$(python -c "import yaml,sys; print(yaml.safe_load(open('$DOMAIN_YAML'))['domain'])")
          echo "real_domain=$REAL_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "slug=${{ matrix.domain }}" >> "$GITHUB_OUTPUT"
          echo "Domain slug='${{ matrix.domain }}' → real='$REAL_DOMAIN'"

      - name: Initialize fresh DB for this domain
        env:
          # CI-only temporary credentials — niezbędne dla pydantic settings,
          # ale baza jest tworzona od zera w każdym jobie i nigdy nie wychodzi poza runner
          SECRET_KEY: ci-only-temp-secret-key-build-stage-not-for-runtime
          ADMIN_USERNAME: ci-admin
          ADMIN_PASSWORD: ci-only-temp-password-for-schema-creation-min-16
          DATABASE_URL: sqlite:///./backend/zdrowiefit.db
        run: |
          python scripts/init_ci_db.py "${{ matrix.domain }}"

      - name: Import articles from markdown sources
        env:
          USE_API: 'false'
        run: |
          if [ -d "content_generated/${{ matrix.domain }}" ]; then
            python content_generated/import_articles.py "${{ matrix.domain }}" --force-update
          else
            echo "Brak content_generated/${{ matrix.domain }}/ — buduję domenę bez artykułów (tylko strony statyczne z YAML)."
          fi

      - name: Build static site
        env:
          USE_API: 'false'
          GA4_ID: ${{ secrets.GA4_ID }}
          FB_PIXEL_ID: ${{ secrets.FB_PIXEL_ID }}
          FB_PAGE: ${{ secrets.FB_PAGE }}
          IG_HANDLE: ${{ secrets.IG_HANDLE }}
          NEWSLETTER_ENDPOINT: ${{ secrets.NEWSLETTER_ENDPOINT }}
        run: |
          CLEAN_FLAG=""
          if [[ "${{ github.event.inputs.clean }}" != "false" ]]; then CLEAN_FLAG="--clean"; fi
          python build.py --domain "${{ steps.cfg.outputs.real_domain }}" $CLEAN_FLAG

      - name: Deploy via SFTP to Cyber_Folks
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT || 222 }}
          user: ${{ secrets.FTP_USER }}
          pass: ${{ secrets.FTP_PASS }}
          onlyNewer: true
          settings: 'sftp:auto-confirm yes'
          localDir: './output/${{ steps.cfg.outputs.slug }}/'
          remoteDir: /home/bestios/domains/${{ steps.cfg.outputs.real_domain }}/public_html
