about:
  intro: "AI Dzisiaj to portal newsów o sztucznej inteligencji w polskim biznesie. Piszemy o wdrożeniach, narzędziach i regulacjach — bez hype'u, z konkretem, z datą i ze źródłem. Aktualizacja co tydzień."
  values:
