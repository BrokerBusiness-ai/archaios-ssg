    title: "Strategia AI"
    desc: "Pillar + cornerstone dla zarządów. Mapa decyzyjna, ROI, governance, ryzyka, audyt dojrzałości."
    link: "/kategoria/strategia.html"
  - icon: "💡"
    title: "Use cases"
    desc: "12 wdrożeń AI z udokumentowanym ROI: customer service, lead scoring, backoffice, produkcja."
    link: "/kategoria/use-cases.html"
  - icon: "🚀"
    title: "Wdrożenia"
    desc: "Pierwszy projekt AI od zera do produkcji. Krok po kroku, z błędami do uniknięcia."
    link: "/kategoria/wdrozenia.html"

