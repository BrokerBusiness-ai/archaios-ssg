domain: "aidzisiaj.pl"
name: "AI Dzisiaj"
tagline: "Newsy AI dla polskiego biznesu — dziś, nie jutro"
description: "Newsy o AI dla polskiego biznesu. Wdrożenia, narzędzia, regulacje. Bez bullshit-bingo, z konkretem i datą."
lang: "pl"
locale: "pl_PL"

brand: "archaios"
main_domain: "archaios.ai"
funnel_type: "article_cta"
role: "satellite"

# Tech mark: SVG mark z neuronową siecią A-shape (cyan/magenta/violet)
# logo_mark zostaje jako fallback dla social embeds, ale w headerze renderuje się SVG
logo_mark: "⚡"
logo_mark_svg: "/img/logo-mark.svg"
logo_text: "AI"
logo_accent: "Dzisiaj"

# CYBER PALETTE — electric cyan + neon magenta + violet AI
# Dark dominujące, ostre, neonowe akcenty
colors:
  primary: "#00d9ff"          # electric cyan — main brand
  primary_dark: "#00a8cc"
  primary_light: "#66e8ff"
  accent: "#ff2d92"            # neon magenta — CTA, hot newsy
  accent_dark: "#cc1973"
  trust: "#a78bfa"             # AI violet — źródła/badania/regulacje

# THEME — geometric sans + dark mode + ostre rogi + cool shadows
theme:
  # Typografia tech — Inter z agresywnym weight (Vercel/Linear vibe)
  # Self-hosted bez external CDN — używamy tego co jest w /fonts/
  font_heading: "Inter"
  font_body: "Inter"
  font_size_base: "16px"
  line_height: "1.6"
  heading_weight: "800"          # ekstra bold = tech header
  letter_spacing_heading: "-0.035em"  # tight = modern tech

  # Geometria — ostrzejsze rogi
  radius_sm: "4px"
  radius: "8px"
  radius_lg: "12px"
  radius_pill: "24px"

  # Layout — szerszy container dla feed-style
  container_max: "1240px"
  prose_max: "720px"

  # Spacing
  gutter: "clamp(1rem, 4vw, 2rem)"
  section_spacing: "clamp(3rem, 8vw, 5.5rem)"

  # Transitions — szybsze, snappier
  transition_fast: "120ms"
  transition_base: "200ms"
  transition_slow: "350ms"

  # DARK MODE auto
  dark_mode: true

  # Cool shadows (mniej ciepła)
  shadow_warmth: "cool"

hero:
  eyebrow: "AI · NEWS · 2026"
  h1: "AI dla polskiego biznesu — dziś, nie jutro"
  subtitle: "Newsy. Wdrożenia. Regulacje. Bez bullshit-bingo."
  cta_primary:
    text: "Najnowsze artykuły →"
    url: "/artykuly.html"
