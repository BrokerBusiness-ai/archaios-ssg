    <text x="0" y="0" font-family="'IBM Plex Sans', sans-serif" font-size="96" font-weight="800" fill="#fdfcf9" text-anchor="middle">10M</text>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="28" fill="#f59e0b" text-anchor="middle" letter-spacing="4">€ MAX</text>
