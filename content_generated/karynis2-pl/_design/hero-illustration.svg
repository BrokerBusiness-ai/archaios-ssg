<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <defs>
    <radialGradient id="navyRadK" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0a1830"/>
