  <text x="300" y="40" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#a8b8d0" text-anchor="middle" opacity="0.8" letter-spacing="3">MAKSYMALNA KARA NIS2</text>
  <text x="300" y="395" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#a8b8d0" text-anchor="middle" opacity="0.6">Podmioty kluczowe • Personalna odpowiedzialność zarządu</text>
