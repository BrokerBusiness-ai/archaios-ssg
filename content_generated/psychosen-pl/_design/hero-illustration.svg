<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2d3a7c"/>
      <stop offset="100%" stop-color="#0a1130"/>
    </radialGradient>
    <linearGradient id="moonGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" fill="url(#skyGrad)"/>

  <!-- Gwiezdne pole -->
  <g fill="#c0c8d0">
    <circle cx="60" cy="50" r="0.8"/>
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="200" cy="40" r="0.9"/>
    <circle cx="280" cy="70" r="1.4"/>
    <circle cx="380" cy="50" r="0.7"/>
    <circle cx="460" cy="90" r="1.1"/>
    <circle cx="520" cy="60" r="0.9"/>
    <circle cx="40" cy="160" r="1"/>
    <circle cx="540" cy="180" r="0.8"/>
    <circle cx="50" cy="240" r="0.6"/>
  </g>
  <g fill="#6b9fd4" opacity="0.7">
    <circle cx="160" cy="120" r="1.3"/>
    <circle cx="430" cy="140" r="1"/>
    <circle cx="100" cy="200" r="0.9"/>
  </g>

  <!-- Świecący księżyc -->
  <circle cx="430" cy="100" r="80" fill="url(#moonGlow)"/>
  <circle cx="430" cy="100" r="50" fill="url(#moonGlow)"/>
  <path d="M 460 60 A 40 40 0 1 0 460 140 A 32 32 0 1 1 460 60 Z" fill="#d4a843"/>

  <!-- Pejzaż horyzontu (góry uproszczone) -->
  <path d="M 0 320 L 100 280 L 180 310 L 280 270 L 380 305 L 480 285 L 600 310 L 600 420 L 0 420 Z" fill="#1e2854"/>
  <path d="M 0 350 L 80 330 L 170 345 L 260 320 L 360 340 L 470 325 L 600 345 L 600 420 L 0 420 Z" fill="#0a1130"/>

  <!-- Sylwetka osoby śpiącej (uproszczona — głowa na poduszce) -->
  <g transform="translate(180, 310)">
    <!-- Poduszka -->
    <ellipse cx="60" cy="50" rx="80" ry="14" fill="#3a4a8c" opacity="0.6"/>
    <!-- Głowa -->
    <circle cx="60" cy="36" r="22" fill="#6a7bc4" opacity="0.95"/>
    <!-- Spokojne zamknięte oczy (linia) -->
    <line x1="50" y1="34" x2="56" y2="34" stroke="#1e2854" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="64" y1="34" x2="70" y2="34" stroke="#1e2854" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Subtelny uśmiech -->
    <path d="M 55 44 Q 60 47 65 44" stroke="#1e2854" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Fale snu (jak EEG) — subtelne -->
  <path d="M 50 380 Q 80 370 110 380 T 170 380 T 230 380" stroke="#6b9fd4" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 370 385 Q 400 378 430 385 T 490 385 T 550 385" stroke="#d4a843" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Etykiety subtelne -->
  <text x="50" y="50" font-family="'Cormorant Garamond', Georgia, serif" font-size="13" fill="#c0c8d0" opacity="0.7" letter-spacing="3" font-style="italic">NOC</text>
  <text x="510" y="180" font-family="'Cormorant Garamond', Georgia, serif" font-size="13" fill="#d4a843" opacity="0.7" letter-spacing="3" font-style="italic">SEN</text>
</svg>
