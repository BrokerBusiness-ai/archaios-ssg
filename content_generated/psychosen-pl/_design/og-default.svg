<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="nightSky" cx="80%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2d3a7c"/>
      <stop offset="60%" stop-color="#1e2854"/>
      <stop offset="100%" stop-color="#0a1130"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#nightSky)"/>

  <!-- Gwiazdy rozsiane -->
  <g fill="#c0c8d0">
    <circle cx="80" cy="120" r="1.2"/>
    <circle cx="180" cy="80" r="1.5"/>
    <circle cx="280" cy="160" r="1"/>
    <circle cx="420" cy="100" r="1.3"/>
    <circle cx="560" cy="60" r="0.8"/>
    <circle cx="120" cy="240" r="1"/>
    <circle cx="240" cy="380" r="1.4"/>
    <circle cx="80" cy="500" r="1"/>
    <circle cx="360" cy="540" r="1.2"/>
    <circle cx="180" cy="430" r="0.8"/>
  </g>
  <g fill="#6b9fd4" opacity="0.6">
    <circle cx="100" cy="180" r="1.5"/>
    <circle cx="320" cy="220" r="1.2"/>
    <circle cx="200" cy="320" r="1"/>
  </g>

  <!-- Wielki półksiężyc po prawej -->
  <g transform="translate(900, 150)">
    <circle cx="160" cy="160" r="160" fill="#d4a843" opacity="0.08"/>
    <circle cx="160" cy="160" r="120" fill="#d4a843" opacity="0.12"/>
    <path d="M 200 60 A 100 100 0 1 0 200 260 A 78 78 0 1 1 200 60 Z" fill="#d4a843"/>
  </g>

  <!-- Główny znak po lewej (duży) -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="100" height="100" rx="22" fill="#1e2854" stroke="#3a4a8c" stroke-width="1"/>
    <path d="M 72 32 A 24 24 0 1 0 72 68 A 18 18 0 1 1 72 32 Z" fill="#d4a843"/>
    <circle cx="28" cy="34" r="2.5" fill="#c0c8d0"/>
    <circle cx="34" cy="64" r="1.8" fill="#c0c8d0"/>
    <circle cx="22" cy="54" r="1.4" fill="#6b9fd4"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="240" y="270" font-family="'Cormorant Garamond', Georgia, serif" font-size="74" font-weight="500" fill="#e8ecf4" letter-spacing="1">Psycho<tspan fill="#d4a843" font-style="italic" font-weight="600">Sen</tspan></text>
  <text x="240" y="320" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#c0c8d0" font-weight="300">Nauka o śnie — jak spać lepiej i zdrowiej</text>

  <!-- Linia dekoracyjna -->
  <line x1="240" y1="360" x2="380" y2="360" stroke="#d4a843" stroke-width="2" opacity="0.7"/>

  <!-- Footer -->
  <text x="100" y="585" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8a96b0" font-weight="400">psychosen.pl</text>
</svg>
