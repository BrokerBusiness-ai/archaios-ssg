<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <defs>
    <linearGradient id="amberBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfcf9"/>
      <stop offset="100%" stop-color="#ede0c8"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" fill="url(#amberBg2)"/>

  <!-- Trzy świece na osi czasu — skala wypalenia -->
  <!-- Świeca 1: pełen płomień (energia) -->
  <g transform="translate(120, 180)">
    <rect x="-12" y="60" width="24" height="80" fill="#c4a882"/>
    <line x1="0" y1="60" x2="0" y2="40" stroke="#7c5b3c" stroke-width="1.5"/>
    <path d="M 0 0 Q -10 16 -10 28 Q -10 38 0 42 Q 10 38 10 28 Q 10 16 0 0 Z" fill="#e8922d"/>
    <text x="0" y="170" font-family="'Source Serif Pro', Georgia, serif" font-size="11" fill="#5a4129" text-anchor="middle" opacity="0.7">ENERGIA</text>
  </g>

  <!-- Świeca 2: przygaszony płomień (wypalenie) -->
  <g transform="translate(300, 180)">
    <rect x="-12" y="60" width="24" height="80" fill="#c4a882"/>
    <line x1="0" y1="60" x2="0" y2="40" stroke="#7c5b3c" stroke-width="1.5"/>
    <path d="M 0 14 Q -7 24 -7 32 Q -7 38 0 40 Q 7 38 7 32 Q 7 24 0 14 Z" fill="#c07824"/>
    <text x="0" y="170" font-family="'Source Serif Pro', Georgia, serif" font-size="11" fill="#5a4129" text-anchor="middle" opacity="0.7">WYPALENIE</text>
  </g>

  <!-- Świeca 3: nowa zielona iskra (regeneracja) -->
  <g transform="translate(480, 180)">
    <rect x="-12" y="60" width="24" height="80" fill="#c4a882"/>
    <line x1="0" y1="60" x2="0" y2="40" stroke="#7c5b3c" stroke-width="1.5"/>
    <circle cx="0" cy="36" r="6" fill="#7a9a6d"/>
    <path d="M 0 28 Q -3 32 -3 36 Q -3 40 0 41 Q 3 40 3 36 Q 3 32 0 28 Z" fill="#7a9a6d" opacity="0.6"/>
    <text x="0" y="170" font-family="'Source Serif Pro', Georgia, serif" font-size="11" fill="#5a4129" text-anchor="middle" opacity="0.7">REGENERACJA</text>
  </g>

  <!-- Cienka kreska łącząca -->
  <line x1="160" y1="240" x2="260" y2="240" stroke="#c0703a" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>
  <line x1="340" y1="240" x2="440" y2="240" stroke="#7a9a6d" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>

  <!-- Drobny dym z drugiej świecy (znak wypalenia) -->
  <path d="M 300 160 Q 305 150 303 140 Q 297 132 302 125" stroke="#9a8a6d" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Tytuł sceny -->
  <text x="300" y="60" font-family="'Source Serif Pro', Georgia, serif" font-size="14" fill="#5a4129" text-anchor="middle" opacity="0.7" letter-spacing="3">CYKL ENERGII ZAWODOWEJ</text>
</svg>
