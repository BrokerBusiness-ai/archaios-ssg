<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfcf9"/>
      <stop offset="100%" stop-color="#f4f1ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#warmGrad)"/>

  <!-- Dekoracyjne tło -->
  <circle cx="1050" cy="200" r="300" fill="#2c6e8a" opacity="0.06"/>
  <circle cx="200" cy="500" r="220" fill="#e07b4f" opacity="0.05"/>
  <circle cx="700" cy="100" r="100" fill="#7b68ee" opacity="0.04"/>

  <!-- Główny znak po lewej -->
  <g transform="translate(100, 220)">
    <rect x="0" y="0" width="100" height="100" rx="22" fill="#2c6e8a"/>
    <circle cx="36" cy="44" r="5" fill="#fdfcf9"/>
    <circle cx="64" cy="44" r="5" fill="#fdfcf9"/>
    <path d="M 32 60 Q 50 72 68 60" stroke="#e07b4f" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="240" y="280" font-family="'Source Serif Pro', Georgia, serif" font-size="74" font-weight="600" fill="#1d4e66" letter-spacing="-0.5">Psycho<tspan fill="#e07b4f">Dzisiaj</tspan></text>
  <text x="240" y="335" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#5a5a5a" font-weight="400">Psychologia na co dzień — zrozum siebie</text>

  <!-- Linia dekoracyjna -->
  <line x1="240" y1="375" x2="380" y2="375" stroke="#e07b4f" stroke-width="3"/>

  <!-- Footer -->
  <text x="100" y="585" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#7a7a7a">psychodzisiaj.pl · oparte na badaniach naukowych</text>
</svg>
