<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <defs>
    <radialGradient id="navyRadR" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </radialGradient>
  </defs>
  <rect width="600" height="420" fill="url(#navyRadR)"/>

  <!-- RAG flow diagram -->
  <g transform="translate(80, 200)">
    <!-- Query box -->
    <rect x="0" y="-30" width="80" height="60" rx="6" fill="#1a365d" stroke="#fdfcf9" stroke-width="1.5"/>
    <text x="40" y="0" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#fdfcf9" text-anchor="middle">Query</text>
    <text x="40" y="15" font-family="Inter, sans-serif" font-size="8" fill="#a8b8d0" text-anchor="middle">user pytanie</text>

    <!-- Arrow -->
    <line x1="80" y1="0" x2="120" y2="0" stroke="#00ff88" stroke-width="2"/>
    <polygon points="120,-4 128,0 120,4" fill="#00ff88"/>

    <!-- Embedding -->
    <rect x="130" y="-30" width="80" height="60" rx="6" fill="#1a365d" stroke="#a855f7" stroke-width="1.5"/>
    <text x="170" y="0" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#a855f7" text-anchor="middle">Embedding</text>
    <text x="170" y="15" font-family="Inter, sans-serif" font-size="8" fill="#a8b8d0" text-anchor="middle">[0.12, 0.84...]</text>

    <!-- Arrow -->
    <line x1="210" y1="0" x2="250" y2="0" stroke="#00ff88" stroke-width="2"/>
    <polygon points="250,-4 258,0 250,4" fill="#00ff88"/>

    <!-- Vector DB -->
    <rect x="260" y="-30" width="80" height="60" rx="6" fill="#1a365d" stroke="#a855f7" stroke-width="1.5"/>
    <text x="300" y="0" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#a855f7" text-anchor="middle">Vector DB</text>
    <text x="300" y="15" font-family="Inter, sans-serif" font-size="8" fill="#a8b8d0" text-anchor="middle">top-k chunks</text>

    <!-- Arrow -->
    <line x1="340" y1="0" x2="380" y2="0" stroke="#00ff88" stroke-width="2"/>
    <polygon points="380,-4 388,0 380,4" fill="#00ff88"/>

    <!-- LLM -->
    <rect x="390" y="-30" width="80" height="60" rx="6" fill="#1a365d" stroke="#00ff88" stroke-width="1.5"/>
    <text x="430" y="0" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00ff88" text-anchor="middle">LLM</text>
    <text x="430" y="15" font-family="Inter, sans-serif" font-size="8" fill="#a8b8d0" text-anchor="middle">odpowiedź</text>
  </g>

  <text x="300" y="40" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#a8b8d0" text-anchor="middle" opacity="0.8" letter-spacing="3">RAG = RETRIEVAL-AUGMENTED GENERATION</text>
  <text x="300" y="365" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#a8b8d0" text-anchor="middle" opacity="0.6">embeddings + vector DB + chunking + re-ranking</text>
</svg>
