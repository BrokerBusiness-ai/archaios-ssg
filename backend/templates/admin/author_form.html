{% extends "components/base.html" %}
{% set active = "authors" %}
{% block title %}{{ "Edytuj" if author else "Nowy" }} autor{% endblock %}
{% block content %}
<div class="header">
    <h1>{{ "Edytuj autora" if author else "Nowy autor" }}</h1>
    <a href="/admin/authors" class="btn btn-sm" style="border:1px solid #e2e8f0">← Wróć</a>
</div>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<div class="card">
<form method="post" action="{{ '/admin/authors/' ~ author.id ~ '/edit' if author else '/admin/authors/new' }}">
    <div class="form-row">
        <div class="form-group">
            <label for="name">Imię i nazwisko *</label>
            <input type="text" id="name" name="name" value="{{ (author.name or '') if author else '' }}" required placeholder="np. dr Anna Kowalska">
        </div>
        <div class="form-group">
            <label for="credentials">Kredencjały (wyświetlane na stronie)</label>
            <input type="text" id="credentials" name="credentials" value="{{ (author.credentials or '') if author else '' }}" placeholder="np. dr n. med., psychoterapeutka">
        </div>
    </div>

    <div class="form-group">
        <label for="bio_short">Bio krótkie (1-2 zdania — pod nazwiskiem)</label>
        <textarea id="bio_short" name="bio_short" rows="2" maxlength="500" style="min-height:auto">{{ (author.bio_short or '') if author else '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="bio_long">Bio długie (HTML — na stronie autora)</label>
        <textarea id="bio_long" name="bio_long" rows="8">{{ (author.bio_long or '') if author else '' }}</textarea>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="photo_url">URL zdjęcia (kwadratowe ~400×400)</label>
            <input type="text" id="photo_url" name="photo_url" value="{{ (author.photo_url or '') if author else '' }}">
        </div>
        <div class="form-group">
            <label for="specializations">Specjalizacje (przecinki)</label>
            <input type="text" id="specializations" name="specializations" value="{{ (author.specializations or '') if author else '' }}" placeholder="np. psychoterapia, CBT, mindfulness">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="email">Email (publiczny)</label>
            <input type="email" id="email" name="email" value="{{ (author.email or '') if author else '' }}">
        </div>
        <div class="form-group">
            <label for="linkedin">LinkedIn URL</label>
            <input type="text" id="linkedin" name="linkedin" value="{{ (author.linkedin or '') if author else '' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="twitter">Twitter/X URL</label>
            <input type="text" id="twitter" name="twitter" value="{{ (author.twitter or '') if author else '' }}">
        </div>
        <div class="form-group">
            <label for="website">Własna strona / blog</label>
            <input type="text" id="website" name="website" value="{{ (author.website or '') if author else '' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="sort_order">Kolejność (0 = najwyżej)</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ (author.sort_order or 0) if author else 0 }}">
        </div>
        <div class="form-group" style="display:flex;align-items:end;padding-bottom:8px">
            <label class="form-check">
                <input type="checkbox" name="is_active" value="true" {% if not author or author.is_active %}checked{% endif %}>
                Aktywny (widoczny)
            </label>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">💾 {{ "Zapisz" if author else "Utwórz" }}</button>
    <a href="/admin/authors" class="btn" style="background:#e2e8f0;color:#1e293b">Anuluj</a>
</form>
</div>
{% endblock %}
